# Automated dependency updates (issue #128).
#
# Ecosystems:
#   * bun            — package.json + bun.lock (CI installs with
#                      `bun install --frozen-lockfile`, so the JS deps must be
#                      driven through Bun, not npm, to keep the lockfile in
#                      sync). Requires Dependabot's Bun support (bun >= 1.1.39).
#   * github-actions — refreshes the SHA pins from #129 and their version
#                      comments together.
#   * docker         — the oven/bun base image in the Dockerfile.
#
# Every update — majors included — is grouped into a single weekly PR per
# ecosystem to keep the review load low. Omitting `update-types` from a group
# is what pulls majors in; splitting them out again just means three or four
# PRs land the same morning, and the breaking change gets read no more closely
# for having its own branch. Read the group PR's changelog table instead.
version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      js-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      docker:
        patterns:
          - "*"
