name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Least-privilege token scopes required by the official Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialise Pages deployments. #121: the previous setup ran two deployment
# mechanisms at once — peaceiris/actions-gh-pages pushing to the `gh-pages`
# branch AND GitHub's branch-based Pages build — which left deployments stuck
# in `deployment_queued` until the 10-minute timeout. A single serialised
# `pages` group prevents a new push from racing an in-flight deploy. Don't
# cancel an in-progress production deploy midway.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Build with Bun to match CI, the release tarball, and the Docker `ui`
      # stage. `npm install` broke here (ERESOLVE) because bun.lock is the
      # source of truth and its dependency graph is only npm-peer-consistent
      # under Bun's resolver; keeping every build path on Bun also stops the
      # Pages bundle from drifting away from the shipped Docker bundle.
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: VITE_BASE_URL="/ocpp-cp-simulator" bun run build
      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/index.html dist/404.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # The official single-mechanism Pages deployment (replaces the
    # peaceiris push to `gh-pages`). Requires the repo Pages source to be
    # set to "GitHub Actions": Settings → Pages → Build and deployment →
    # Source → GitHub Actions.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
