name: Build & publish Docker image

# Multi-arch (amd64 + arm64) build of the bundled daemon + web console
# image, published to GitHub Container Registry under
# ghcr.io/<owner>/<repo>. Tags emitted by docker/metadata-action:
#   - main          → `latest` + `main` + `sha-<short>`
#   - cli-v1.2.3    → `1.2.3`  + `1.2`  + `1` + `sha-<short>`
#   - v*            → semver (full / minor / major) + `sha-<short>`
#   - other branch  → `<branch-slug>` + `sha-<short>` (no `latest`)
#
# Pull-request builds run too but don't push, so a PR can verify its own
# Dockerfile change before merge.

on:
  push:
    branches:
      - main
      - "feat/**"
    tags:
      - "v*"
      - "cli-v*"
  pull_request:
    paths:
      - Dockerfile
      - docker-compose.yml
      - .github/workflows/docker-publish.yml
      - package.json
      - bun.lock
      - "src/**"
      - "public/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # `latest` only on the default branch
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            # v1.2.3 → 1.2.3 / 1.2 / 1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # cli-v1.2.3 → 1.2.3 (strip the prefix)
            type=match,pattern=cli-v(.*),group=1
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Speed up rebuilds by sharing layers across runs. GitHub Actions
          # cache is local to the repo so it's safe to write back.
          cache-from: type=gha
          cache-to: type=gha,mode=max
