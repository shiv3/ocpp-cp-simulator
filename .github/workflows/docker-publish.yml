name: Build & publish Docker image

# Multi-arch (amd64 + arm64) build of the bundled daemon + web console
# image, published to GitHub Container Registry under
# ghcr.io/<owner>/<repo>. Triggers:
#   - push to `main`                       тЖТ `main` + `sha-<short>` + `latest`
#   - push to `feat/browser-remote-mode`   тЖТ branch-slug + `sha-<short>` (no `latest`)
#   - push of a `vX.Y.Z` tag               тЖТ `X.Y.Z` + `X.Y` + `X` (semver pins)
#   - manual via workflow_dispatch         тЖТ same as the triggering branch
#
# We deliberately do NOT build on every PR or every feature branch:
# Docker layers take time + cache space, and the active branch already
# rebuilds on every push. Versioned releases come from `vX.Y.Z` tags
# (same tags that `release.yml` cuts for the desktop app), giving
# reproducible image pins like `ghcr.io/<owner>/<repo>:1.2.3`. `latest`
# stays pinned to `main` (bleeding edge), not to the newest release.

on:
  push:
    branches:
      # Default branch тАФ every merge produces a `latest` image.
      - main
      # Active feature branch тАФ pushes here get an image tagged with the
      # branch slug + commit sha so we can test changes without merging.
      - feat/browser-remote-mode
    tags:
      # Semver release tags тАФ publish immutable `X.Y.Z` / `X.Y` / `X`
      # image pins for reproducible deployments (issue #72).
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Only tag-triggered semver releases get stamped; branch builds stay
      # 0.0.0 (web console footer hides the version). The build context is
      # the checkout, so the Dockerfile's UI stage picks up the stamped
      # package.json and Vite bakes the version into the bundle (issue #93).
      - name: Setup Node (for version stamping)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Resolve version
        id: version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Stamp package version
        if: startsWith(github.ref, 'refs/tags/')
        run: npm version --no-git-tag-version --allow-same-version "${{ steps.version.outputs.version }}"

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # `latest` deliberately tracks the default branch (bleeding edge),
          # NOT the newest semver tag тАФ so disable metadata-action's built-in
          # "latest on semver" behaviour and set `latest` ourselves below.
          flavor: |
            latest=false
          tags: |
            # main       тЖТ `main` + `sha-<short>` + `latest`
            # feat/...   тЖТ branch-slug + `sha-<short>` (no `latest`)
            # v1.2.3 tag тЖТ `1.2.3` + `1.2` + `1` (semver release pins)
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Speed up rebuilds by sharing layers across runs. GitHub Actions
          # cache is local to the repo so it's safe to write back.
          cache-from: type=gha
          cache-to: type=gha,mode=max
