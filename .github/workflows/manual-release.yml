name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.0)"
        required: true
        type: string

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Create Release
        id: create_release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ inputs.version }}`,
              name: `OCPP CP Simulator v${{ inputs.version }}`,
              draft: true,
              prerelease: false,
              generate_release_notes: true
            });
            return data.id;

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            target: "x86_64-apple-darwin"
          # Linux ships .deb + .rpm only; AppImage bundling via linuxdeploy
          # fails on GitHub runners (#122). See release.yml for the full
          # rationale. Re-add "appimage" once the upstream bug is fixed.
          - platform: "ubuntu-22.04"
            args: "--bundles deb,rpm"
            target: "x86_64-unknown-linux-gnu"
          - platform: "windows-latest"
            args: ""
            target: "x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Node is still needed: tauri-action's runtime + the `npx @tauri-apps/cli
      # icon` step below. Dependency install + the tauri build itself go
      # through Bun (see below), so there's no npm cache to prime here.
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "src-tauri -> target"
          cache-targets: "false"

      - name: Install Rust stable
        # rust-toolchain derives the toolchain from the ref name, so a pinned
        # SHA needs the toolchain named explicitly.
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Bun is the package manager for this repo's build path: it compiles
      # the sidecar below, and tauri-action detects bun.lock and runs
      # `bun tauri build`. Install with the same tool so there's a single,
      # frozen-lockfile install rather than an npm/bun mix.
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI sidecar (Bun --compile → src-tauri/binaries/)
        # The Tauri build step below picks up the sidecar via
        # `bundle.externalBin`. Tauri expects the suffix to match the
        # rust target triple, which is what scripts/build-tauri-sidecar.sh
        # produces. Bun handles cross-compile internally.
        shell: bash
        env:
          TAURI_TARGET: ${{ matrix.target }}
        run: bash scripts/build-tauri-sidecar.sh

      - name: Generate app icon
        run: |
          cd src-tauri
          npx @tauri-apps/cli icon icons/icon.svg

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri's beforeBuildCommand re-runs build-tauri-sidecar.sh; hand it
          # the matrix triple so it doesn't have to auto-detect the host (which
          # fails on the Windows MINGW runner, and would pick the wrong arch
          # for the cross-compiled x86_64 macOS build).
          TAURI_TARGET: ${{ matrix.target }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
