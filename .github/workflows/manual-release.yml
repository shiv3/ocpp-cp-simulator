name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.0)"
        required: true
        type: string

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ inputs.version }}`,
              name: `OCPP CP Simulator v${{ inputs.version }}`,
              draft: true,
              prerelease: false,
              generate_release_notes: true
            });
            return data.id;

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            target: "x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
            target: "x86_64-unknown-linux-gnu"
          - platform: "windows-latest"
            args: ""
            target: "x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Node is still needed: tauri-action's runtime + the `npx @tauri-apps/cli
      # icon` step below. Dependency install + the tauri build itself go
      # through Bun (see below), so there's no npm cache to prime here.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          cache-targets: "false"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Bun is the package manager for this repo's build path: it compiles
      # the sidecar below, and tauri-action detects bun.lock and runs
      # `bun tauri build`. Install with the same tool so there's a single,
      # frozen-lockfile install rather than an npm/bun mix.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI sidecar (Bun --compile → src-tauri/binaries/)
        # The Tauri build step below picks up the sidecar via
        # `bundle.externalBin`. Tauri expects the suffix to match the
        # rust target triple, which is what scripts/build-tauri-sidecar.sh
        # produces. Bun handles cross-compile internally.
        shell: bash
        env:
          TAURI_TARGET: ${{ matrix.target }}
        run: bash scripts/build-tauri-sidecar.sh

      - name: Generate app icon
        run: |
          cd src-tauri
          npx @tauri-apps/cli icon icons/icon.svg

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
