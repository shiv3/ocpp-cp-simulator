name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            target: "x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
            target: "x86_64-unknown-linux-gnu"
          - platform: "windows-latest"
            args: ""
            target: "x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Node is still needed: tauri-action's runtime + the `npx @tauri-apps/cli
      # icon` step below. Dependency install + the tauri build itself go
      # through Bun (see below), so there's no npm cache to prime here.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          cache-targets: "false"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Bun is the package manager for this repo's build path: it compiles
      # the sidecar below, and tauri-action detects bun.lock and runs
      # `bun tauri build`. Install with the same tool so there's a single,
      # frozen-lockfile install rather than an npm/bun mix.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI sidecar (Bun --compile → src-tauri/binaries/)
        # The Tauri build step below picks up the sidecar via
        # `bundle.externalBin`. Tauri expects the suffix to match the
        # rust target triple, which is what scripts/build-tauri-sidecar.sh
        # produces. Bun handles cross-compile internally.
        shell: bash
        env:
          TAURI_TARGET: ${{ matrix.target }}
        run: bash scripts/build-tauri-sidecar.sh

      - name: Generate app icon
        run: |
          cd src-tauri
          npx @tauri-apps/cli icon icons/icon.svg

      # Only tag-triggered semver releases get stamped; branch builds stay
      # 0.0.0. tauri-action's beforeBuildCommand runs the Vite build, which
      # bakes package.json's version into the web console footer, so the
      # stamp must land before the Tauri build step.
      - name: Resolve version
        id: version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Stamp package version
        if: startsWith(github.ref, 'refs/tags/')
        run: npm version --no-git-tag-version --allow-same-version "${{ steps.version.outputs.version }}"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri's beforeBuildCommand re-runs build-tauri-sidecar.sh; hand it
          # the matrix triple so it doesn't have to auto-detect the host (which
          # fails on the Windows MINGW runner, and would pick the wrong arch
          # for the cross-compiled x86_64 macOS build).
          TAURI_TARGET: ${{ matrix.target }}
          # linuxdeploy and its plugins are AppImages; GitHub runners lack FUSE,
          # so extract-and-run instead of mounting. Fixes the Linux AppImage
          # bundle dying with "failed to run linuxdeploy". No-op off Linux.
          APPIMAGE_EXTRACT_AND_RUN: "1"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "OCPP CP Simulator ${{ github.ref_name }}"
          releaseBody: |
            See the assets to download this version and install.

            ## What's Changed

            ### Desktop App Downloads
            - **macOS (Apple Silicon)**: `OCPP.CP.Simulator_*_aarch64.dmg`
            - **macOS (Intel)**: `OCPP.CP.Simulator_*_x64.dmg`
            - **Windows**: `OCPP.CP.Simulator_*_x64-setup.exe` or `.msi`
            - **Linux**: `ocpp-cp-simulator_*_amd64.AppImage` or `.deb`

            ### Web Version
            The web version is available at: https://shiv3.github.io/ocpp-cp-simulator/
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  update-release-notes:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        uses: actions/github-script@v7
        with:
          script: |
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: context.ref.replace('refs/tags/', '')
            });

            // Get commit history
            let body = release.body;

            try {
              const { data: commits } = await github.rest.repos.compareCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: 'v0.0.0', // Previous tag - update this
                head: context.ref.replace('refs/tags/', '')
              });
              
              const commitList = commits.commits
                .map(c => `- ${c.commit.message.split('\n')[0]} (${c.sha.substring(0, 7)})`)
                .join('\n');
              
              body = body.replace('## What\'s Changed', `## What's Changed\n\n### Commits\n${commitList}\n`);
            } catch (e) {
              console.log('Failed to get commit history:', e.message);
            }

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: body
            });
