name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            target: "x86_64-apple-darwin"
          # Linux ships .deb + .rpm only. AppImage bundling via linuxdeploy
          # fails on GitHub runners ("failed to run linuxdeploy", #122) — an
          # unresolved upstream Tauri issue that even APPIMAGE_EXTRACT_AND_RUN
          # doesn't fix, aggravated by our Bun-compiled sidecar (externalBin)
          # tripping linuxdeploy's strip step. Leaving AppImage in the target
          # list fails the whole Linux job, so no .deb/.rpm get uploaded either.
          # Re-add "appimage" here once the upstream bug is fixed.
          - platform: "ubuntu-22.04"
            args: "--bundles deb,rpm"
            target: "x86_64-unknown-linux-gnu"
          - platform: "windows-latest"
            args: ""
            target: "x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Node is still needed: tauri-action's runtime + the `npx @tauri-apps/cli
      # icon` step below. Dependency install + the tauri build itself go
      # through Bun (see below), so there's no npm cache to prime here.
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "src-tauri -> target"
          cache-targets: "false"

      - name: Install Rust stable
        # rust-toolchain derives the toolchain from the ref name, so a pinned
        # SHA needs the toolchain named explicitly.
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Bun is the package manager for this repo's build path: it compiles
      # the sidecar below, and tauri-action detects bun.lock and runs
      # `bun tauri build`. Install with the same tool so there's a single,
      # frozen-lockfile install rather than an npm/bun mix.
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI sidecar (Bun --compile → src-tauri/binaries/)
        # The Tauri build step below picks up the sidecar via
        # `bundle.externalBin`. Tauri expects the suffix to match the
        # rust target triple, which is what scripts/build-tauri-sidecar.sh
        # produces. Bun handles cross-compile internally.
        shell: bash
        env:
          TAURI_TARGET: ${{ matrix.target }}
        run: bash scripts/build-tauri-sidecar.sh

      - name: Generate app icon
        run: |
          cd src-tauri
          npx @tauri-apps/cli icon icons/icon.svg

      # Only tag-triggered semver releases get stamped; branch builds stay
      # 0.0.0. tauri-action's beforeBuildCommand runs the Vite build, which
      # bakes package.json's version into the web console footer, so the
      # stamp must land before the Tauri build step.
      - name: Resolve version
        id: version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Stamp package version
        if: startsWith(github.ref, 'refs/tags/')
        run: npm version --no-git-tag-version --allow-same-version "${{ steps.version.outputs.version }}"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri's beforeBuildCommand re-runs build-tauri-sidecar.sh; hand it
          # the matrix triple so it doesn't have to auto-detect the host (which
          # fails on the Windows MINGW runner, and would pick the wrong arch
          # for the cross-compiled x86_64 macOS build).
          TAURI_TARGET: ${{ matrix.target }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "OCPP CP Simulator ${{ github.ref_name }}"
          # `releaseDraft: false` is load-bearing. By the time this workflow
          # runs, the release for this tag is ALREADY PUBLISHED — publishing
          # release-drafter's rolling draft is what creates the tag that
          # triggers us. With `true`, tauri-action ignored that published
          # release and parked the binaries in a NEW draft instead. Release
          # Drafter then adopted that leftover draft on the next merge to main
          # (it updates the newest existing draft rather than making its own),
          # renamed it to the next version, and the operator published it — so
          # every release shipped the PREVIOUS version's binaries: v0.7.2 got
          # 0.7.1's, v0.7.1 got 0.7.0's, and v0.7.0 got none at all. Same class
          # of bug as #121, where two mechanisms both drove Pages deploys.
          releaseDraft: false
          # No `releaseBody`: release-drafter owns the notes (its template
          # already emits "## What's Changed", which update-release-notes below
          # keys off to inject the commit list). Passing a body here would
          # clobber those categorized notes with a static blurb. The download
          # table that used to live here now lives in the drafter template, so
          # it lands on every release regardless of who created it.
          prerelease: false
          args: ${{ matrix.args }}

  update-release-notes:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Generate release notes
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');

            // Match on tag_name from listReleases rather than
            // getReleaseByTag(). The release is published by the time we run
            // (see releaseDraft above), so getReleaseByTag() would now work —
            // but listReleases also surfaces drafts, which keeps this job
            // working if a tag is ever pushed directly without publishing a
            // drafter release first.
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const release = releases.find((r) => r.tag_name === tag);
            if (!release) {
              core.warning(`No release found for tag ${tag}; skipping notes update.`);
              return;
            }

            // Compare base = most recent published release other than this one
            // (listReleases is newest-first). The old hardcoded 'v0.0.0' base
            // dumped the entire project history into every release.
            const prev = releases.find((r) => r.tag_name !== tag && !r.draft);

            let body = release.body || '';
            if (prev) {
              try {
                const { data: diff } = await github.rest.repos.compareCommits({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  base: prev.tag_name,
                  head: tag,
                });
                const commitList = diff.commits
                  .map((c) => `- ${c.commit.message.split('\n')[0]} (${c.sha.substring(0, 7)})`)
                  .join('\n');
                // Normally the body came from release-drafter and already has
                // a "## What's Changed" heading to slot the commits under. But
                // if a tag is pushed directly rather than by publishing a
                // drafter release, tauri-action creates the release itself with
                // an empty body — so add the heading instead of silently
                // dropping the commit list.
                const section = `### Commits (since ${prev.tag_name})\n${commitList}\n`;
                if (commitList && body.includes("## What's Changed")) {
                  body = body.replace(
                    "## What's Changed",
                    `## What's Changed\n\n${section}`,
                  );
                } else if (commitList) {
                  body = `${body}${body ? '\n\n' : ''}## What's Changed\n\n${section}`;
                }
              } catch (e) {
                core.warning(`Failed to get commit history: ${e.message}`);
              }
            }

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body,
            });
