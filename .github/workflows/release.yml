name: Release

# Cut on a `vX.Y.Z` tag — publish the release-drafter draft to create the tag.
# A single tag drives the whole release: the Tauri desktop apps AND the
# npm-style CLI tarball are built here and attached to the same GitHub Release,
# and docker-publish.yml publishes the matching semver images in parallel.
# (The old separate `cli-v*` tag + Release CLI workflow are folded in here.)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            target: "x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
            target: "x86_64-unknown-linux-gnu"
          - platform: "windows-latest"
            args: ""
            target: "x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          cache-targets: "false"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Setup Bun (for sidecar compile)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build CLI sidecar (Bun --compile → src-tauri/binaries/)
        # The Tauri build step below picks up the sidecar via
        # `bundle.externalBin`. Tauri expects the suffix to match the
        # rust target triple, which is what scripts/build-tauri-sidecar.sh
        # produces. Bun handles cross-compile internally.
        shell: bash
        env:
          TAURI_TARGET: ${{ matrix.target }}
        run: bash scripts/build-tauri-sidecar.sh

      - name: Generate app icon
        run: |
          cd src-tauri
          npx @tauri-apps/cli icon icons/icon.svg

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "OCPP CP Simulator ${{ github.ref_name }}"
          releaseBody: |
            See the assets to download this version and install.

            ## What's Changed

            ### Desktop App Downloads
            - **macOS (Apple Silicon)**: `OCPP.CP.Simulator_*_aarch64.dmg`
            - **macOS (Intel)**: `OCPP.CP.Simulator_*_x64.dmg`
            - **Windows**: `OCPP.CP.Simulator_*_x64-setup.exe` or `.msi`
            - **Linux**: `ocpp-cp-simulator_*_amd64.AppImage` or `.deb`

            ### Web Version
            The web version is available at: https://shiv3.github.io/ocpp-cp-simulator/
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  update-release-notes:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        uses: actions/github-script@v7
        with:
          script: |
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: context.ref.replace('refs/tags/', '')
            });

            // Get commit history
            let body = release.body;

            try {
              const { data: commits } = await github.rest.repos.compareCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: 'v0.0.0', // Previous tag - update this
                head: context.ref.replace('refs/tags/', '')
              });
              
              const commitList = commits.commits
                .map(c => `- ${c.commit.message.split('\n')[0]} (${c.sha.substring(0, 7)})`)
                .join('\n');
              
              body = body.replace('## What\'s Changed', `## What's Changed\n\n### Commits\n${commitList}\n`);
            } catch (e) {
              console.log('Failed to get commit history:', e.message);
            }

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: body
            });

  release-cli:
    # Build the npm-style CLI tarball (ocpp-cp-simulator-<version>.tgz, bundling
    # the web console dist/) and attach it to the same vX.Y.Z release as the
    # desktop apps. Folds in what used to be the separate `cli-v*` workflow.
    # Independent of the desktop matrix so a desktop build failure doesn't block
    # the CLI artifact; softprops attaches assets to the existing release.
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (for `npm pack`)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Resolve version
        id: version
        # `vX.Y.Z` tag → bare `X.Y.Z` for `npm version` / the tarball name.
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web console (vite)
        run: bun run build

      - name: Stamp package version
        run: npm version --no-git-tag-version --allow-same-version "${{ steps.version.outputs.version }}"

      - name: Pack tarball
        id: pack
        run: |
          # `npm pack` reads package.json `files` (dist, src/cli, src/cp,
          # scenario templates). --ignore-scripts skips the prepack vite build
          # (already built above) so its log doesn't pollute the captured name.
          TARBALL=$(npm pack --silent --ignore-scripts)
          # Stable filename so consumers can pin
          # releases/latest/download/ocpp-cp-simulator.tgz.
          cp "${TARBALL}" ocpp-cp-simulator.tgz
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"
          ls -lh "${TARBALL}" ocpp-cp-simulator.tgz

      - name: Attach tarball to the release
        # No name/body here on purpose — the desktop job / release-drafter own
        # the release notes; this only uploads the CLI assets onto the same tag.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ${{ steps.pack.outputs.tarball }}
            ocpp-cp-simulator.tgz
