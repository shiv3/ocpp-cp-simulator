# Example: ocpp-cp-simulator (server mode) behind Traefik + Authelia forward-auth.
#
# This is the "behind a reverse proxy with SSO" setup from issue #73. The
# simulator's web console is published at a public HTTPS URL, gated by Authelia
# single-sign-on, with TLS + routing handled by Traefik.
#
# The key bit for the simulator is `--trust-forwarded-headers`: bound to
# 0.0.0.0 behind a proxy, the daemon only knows its internal address, so the
# browser's `Origin: https://ocpp.example.com` would fail the same-origin CORS
# default and the page's own `/assets/*` would 403. With the flag, the daemon
# reconstructs the public origin from Traefik's X-Forwarded-Proto/Host and
# allows them. (Alternatively, drop the flag and pass
# `--cors-origin https://ocpp.example.com` explicitly.)
#
# SECURITY: only safe because the simulator port is NOT published to the host —
# it is reachable solely through Traefik on the internal compose network, so a
# client cannot bypass the proxy and spoof X-Forwarded-* headers.
#
# Replace `ocpp.example.com` and the Authelia secrets/config with your own.
# This file is illustrative, not a turnkey deployment.

services:
  ocpp-cp-simulator:
    image: ghcr.io/shiv3/ocpp-cp-simulator:latest
    restart: unless-stopped
    # NOTE: no `ports:` mapping — only Traefik can reach the daemon, over the
    # internal network. This is what makes --trust-forwarded-headers safe.
    expose:
      - "9700"
    command:
      - --cp-id
      - cp1
      - --connectors
      - "2"
      - --ws-url
      - wss://csms.example.com/chargepoint/
      # Trust Traefik's forwarding headers so the public origin passes CORS.
      - --trust-forwarded-headers
    volumes:
      - ocpp-state:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.ocpp.rule=Host(`ocpp.example.com`)
      - traefik.http.routers.ocpp.entrypoints=websecure
      - traefik.http.routers.ocpp.tls.certresolver=letsencrypt
      # Gate the console behind Authelia forward-auth. The session cookie rides
      # the same-origin `crossorigin` asset requests, so SSO covers /assets too
      # — no need to exempt them.
      - traefik.http.routers.ocpp.middlewares=authelia@docker
      - traefik.http.services.ocpp.loadbalancer.server.port=9700
    networks:
      - proxy

  traefik:
    image: traefik:v3
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=admin@example.com
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - proxy

  authelia:
    image: authelia/authelia:latest
    restart: unless-stopped
    # Provide your own configuration.yml + users_database.yml (see the Authelia
    # docs). Traefik discovers this as the `authelia@docker` forward-auth
    # middleware via the labels below.
    volumes:
      - ./authelia:/config
    labels:
      - traefik.enable=true
      - traefik.http.routers.authelia.rule=Host(`auth.example.com`)
      - traefik.http.routers.authelia.entrypoints=websecure
      - traefik.http.routers.authelia.tls.certresolver=letsencrypt
      - traefik.http.middlewares.authelia.forwardauth.address=http://authelia:9091/api/verify?rd=https://auth.example.com
      - traefik.http.middlewares.authelia.forwardauth.trustForwardHeader=true
      - traefik.http.middlewares.authelia.forwardauth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Name,Remote-Email
    networks:
      - proxy

volumes:
  ocpp-state:
  letsencrypt:

networks:
  proxy:
