# nginx site config for the "behind a reverse proxy with SSO" example.
# Mounted at /etc/nginx/conf.d/default.conf by compose-reverse-proxy-sso.yml.
# Reverse-proxies the ocpp-cp-simulator web console behind Authelia SSO.
# Illustrative, not turnkey — replace the hostnames and provide TLS certs.

# WebSocket upgrade plumbing for the /v1/.../events streams.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# --- Authelia portal: https://auth.example.com ---
server {
    listen 443 ssl;
    http2 on;
    server_name auth.example.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    location / {
        proxy_pass http://authelia:9091;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-For   $remote_addr;
    }
}

# --- Protected console: https://ocpp.example.com ---
server {
    listen 443 ssl;
    http2 on;
    server_name ocpp.example.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Internal subrequest endpoint Authelia answers for auth_request.
    location /internal/authelia/authz {
        internal;
        proxy_pass http://authelia:9091/api/authz/auth-request;
        proxy_pass_request_body off;
        proxy_set_header Content-Length   "";
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Original-URL    $scheme://$http_host$request_uri;
        proxy_set_header X-Forwarded-For   $remote_addr;
    }

    location / {
        # Gate every request (including /assets/*) through Authelia SSO.
        auth_request /internal/authelia/authz;
        # On a denied subrequest, send the browser to the login portal.
        error_page 401 =302 https://auth.example.com/?rd=https://$http_host$request_uri;

        # Forward Authelia's identity to the app (optional).
        auth_request_set $user   $upstream_http_remote_user;
        auth_request_set $groups $upstream_http_remote_groups;
        proxy_set_header  Remote-User   $user;
        proxy_set_header  Remote-Groups $groups;

        # IMPORTANT: forward the PUBLIC scheme + host so the daemon's
        # --trust-forwarded-headers reconstructs https://ocpp.example.com and
        # the same-origin CORS check passes for the crossorigin assets.
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-For   $remote_addr;

        # WebSocket upgrade for the event streams.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_pass http://ocpp-cp-simulator:9700;
    }
}
